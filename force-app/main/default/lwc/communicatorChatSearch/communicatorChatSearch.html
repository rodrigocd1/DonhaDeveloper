<template>
    <div class="comm-search">

        <!-- Campo de busca -->
        <div class="comm-search__bar">
            <lightning-icon icon-name="utility:search" size="x-small" class="comm-search__icon"></lightning-icon>
            <input
                type="search"
                class="comm-search__input"
                placeholder="Buscar mensagens..."
                value={keyword}
                oninput={handleInput}
                onkeydown={handleKeyDown}
            />
            <template if:true={isSearching}>
                <lightning-spinner size="x-small" alternative-text="Buscando..."></lightning-spinner>
            </template>
        </div>

        <!-- Resultados -->
        <template if:true={hasResults}>
            <ul class="comm-search__list" role="listbox">
                <template for:each={results} for:item="result">
                    <li
                        key={result.Id}
                        class="comm-search__item"
                        role="option"
                        data-id={result.Id}
                        onclick={handleResultClick}
                    >
                        <div class="comm-search__item-meta">
                            <span class="comm-search__item-sender">{result.senderName}</span>
                            <span class="comm-search__item-time">{result.formattedTime}</span>
                        </div>
                        <p class="comm-search__item-body" data-id={result.Id}></p>
                    </li>
                </template>
            </ul>
            <div class="comm-search__count">{resultCountLabel}</div>
        </template>

        <!-- Sem resultados -->
        <template if:true={showNoResults}>
            <p class="comm-search__empty">
                Nenhuma mensagem encontrada para &quot;{keyword}&quot;
            </p>
        </template>

    </div>
</template>
