<template>
    <div class="comm-input">

        <!-- Linha de anexo: upload + preview lado a lado -->
        <div class="comm-input__attach-row">
            <div class="comm-input__attach-wrapper">
                <lightning-file-upload
                    name="chatAttachment"
                    label="Anexar arquivo"
                    accept={acceptedFormats}
                    record-id={threadId}
                    onuploadfinished={handleUploadFinished}
                    class="comm-input__file-upload"
                ></lightning-file-upload>
            </div>

            <!-- Preview do arquivo selecionado -->
            <template if:true={uploadedFile}>
                <div class="comm-input__attachment-preview">
                    <lightning-icon icon-name="doctype:attachment" size="x-small"></lightning-icon>
                    <span class="comm-input__attachment-name">{uploadedFile.name}</span>
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare"
                        size="x-small"
                        alternative-text="Remover anexo"
                        title="Remover"
                        onclick={handleRemoveAttachment}
                    ></lightning-button-icon>
                </div>
            </template>
        </div>

        <!-- Linha de envio: textarea + botão -->
        <div class="comm-input__row">
            <textarea
                class="comm-input__textarea"
                placeholder="Digite uma mensagem..."
                value={messageText}
                oninput={handleInput}
                onkeydown={handleKeyDown}
                rows="1"
                disabled={isSending}
            ></textarea>

            <lightning-button-icon
                icon-name="utility:send"
                variant="brand"
                size="medium"
                alternative-text="Enviar mensagem"
                title="Enviar"
                disabled={isSendDisabled}
                onclick={handleSend}
            ></lightning-button-icon>
        </div>

        <!-- Indicador de envio -->
        <template if:true={isSending}>
            <div class="comm-input__uploading">
                <lightning-spinner size="x-small" alternative-text="Enviando..."></lightning-spinner>
                <span>Enviando...</span>
            </div>
        </template>

    </div>
</template>
