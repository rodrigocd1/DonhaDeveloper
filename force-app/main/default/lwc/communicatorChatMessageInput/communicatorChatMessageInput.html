<template>
    <div class="comm-input">

        <!-- Attachment preview (após upload concluído) -->
        <template if:true={uploadedFile}>
            <div class="comm-input__attachment-preview">
                <lightning-icon icon-name="doctype:attachment" size="x-small"></lightning-icon>
                <span class="comm-input__attachment-name">{uploadedFile.name}</span>
                <lightning-button-icon
                    icon-name="utility:close"
                    variant="bare"
                    size="x-small"
                    alternative-text="Remove attachment"
                    onclick={handleRemoveAttachment}
                ></lightning-button-icon>
            </div>
        </template>

        <!-- Input row -->
        <div class="comm-input__row">

            <!-- lightning-file-upload nativo -->
            <div class="comm-input__attach-wrapper">
                <lightning-file-upload
                    name="chatAttachment"
                    accept={acceptedFormats}
                    record-id={threadId}
                    onuploadfinished={handleUploadFinished}
                    class="comm-input__file-upload"
                ></lightning-file-upload>
            </div>

            <!-- Text area -->
            <textarea
                class="comm-input__textarea"
                placeholder="Type a message..."
                value={messageText}
                oninput={handleInput}
                onkeydown={handleKeyDown}
                rows="1"
                disabled={isSending}
            ></textarea>

            <!-- Send button -->
            <lightning-button-icon
                icon-name="utility:send"
                variant="brand"
                size="medium"
                alternative-text="Send message"
                title="Send"
                disabled={isSendDisabled}
                onclick={handleSend}
            ></lightning-button-icon>
        </div>

        <!-- Sending indicator -->
        <template if:true={isSending}>
            <div class="comm-input__uploading">
                <lightning-spinner size="x-small" alternative-text="Sending..."></lightning-spinner>
                <span>Sending...</span>
            </div>
        </template>

    </div>
</template>
