<template>
    <div class="comm-picker">

        <!-- Cabeçalho -->
        <div class="comm-picker__header">
            <lightning-icon icon-name="utility:chat" size="x-small"></lightning-icon>
            <span>Communicator Chat</span>
            <template if:true={showCloseBtn}>
                <button class="comm-picker__close" onclick={handleClose} title="Fechar">
                    <lightning-icon icon-name="utility:close" size="x-small" variant="inverse"></lightning-icon>
                </button>
            </template>
        </div>

        <!-- Corpo -->
        <div class="comm-picker__body">

            <!-- Campo de busca -->
            <div class="comm-picker__search-bar">
                <lightning-icon icon-name="utility:search" size="x-small" class="comm-picker__search-icon"></lightning-icon>
                <input
                    type="search"
                    class="comm-picker__search-input"
                    placeholder={searchPlaceholder}
                    value={keyword}
                    oninput={handleSearchInput}
                    onkeydown={handleSearchKeyDown}
                />
                <template if:true={isSearching}>
                    <lightning-spinner size="x-small" alternative-text="Buscando..."></lightning-spinner>
                </template>
            </div>

            <!-- Resultados agrupados por objeto -->
            <template if:true={hasSearchResults}>
                <div class="comm-picker__results">
                    <template for:each={searchResults} for:item="group">
                        <div key={group.objectApiName} class="comm-picker__result-group">
                            <p class="comm-picker__group-label">{group.objectLabel}</p>
                            <ul class="comm-picker__result-list">
                                <template for:each={group.records} for:item="record">
                                    <li key={record.recordId}>
                                        <button
                                            class="comm-picker__result-btn"
                                            data-id={record.recordId}
                                            data-name={record.name}
                                            data-objecttype={record.objectType}
                                            onclick={handleRecordSelect}
                                        >
                                            <lightning-icon icon-name={group.iconName} size="x-small"></lightning-icon>
                                            <span>{record.name}</span>
                                        </button>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Sem resultados -->
            <template if:true={showNoResults}>
                <p class="comm-picker__no-results">Nenhum registro encontrado para &quot;{keyword}&quot;</p>
            </template>

            <!-- Recentes -->
            <template if:true={showRecent}>
                <div class="comm-picker__recent">
                    <p class="comm-picker__recent-label">Recentes:</p>
                    <ul class="comm-picker__recent-list">
                        <template for:each={recentRecords} for:item="rec">
                            <li key={rec.id}>
                                <button
                                    class="comm-picker__recent-btn"
                                    data-id={rec.id}
                                    data-name={rec.name}
                                    data-objecttype={rec.objectType}
                                    onclick={handleRecordSelect}
                                >
                                    <lightning-icon icon-name="standard:recent" size="x-small"></lightning-icon>
                                    <div class="comm-picker__recent-info">
                                        <span class="comm-picker__recent-name">{rec.name}</span>
                                        <span class="comm-picker__recent-type">{rec.objectType}</span>
                                    </div>
                                </button>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

            <!-- Carregando thread -->
            <template if:true={isLoadingThread}>
                <div class="comm-picker__loading">
                    <lightning-spinner size="x-small" alternative-text="Abrindo chat..."></lightning-spinner>
                    <span>Abrindo chat...</span>
                </div>
            </template>

            <!-- Erro -->
            <template if:true={errorMessage}>
                <div class="comm-picker__error">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                    <span>{errorMessage}</span>
                </div>
            </template>

        </div>
    </div>
</template>
