<template>
  <section class="checkin-card" aria-labelledby="corretor-checkin-title">
    <template lwc:if={isLoading}>
      <lightning-spinner
        alternative-text="Carregando loja padrão"
        size="small"
      ></lightning-spinner>
    </template>

    <template lwc:elseif={errorMessage}>
      <div class="feedback feedback-error" role="alert">
        <p>{errorMessage}</p>
        <lightning-button
          label="Tentar novamente"
          onclick={loadDefaultStore}
        ></lightning-button>
      </div>
    </template>

    <template lwc:else>
      <div class="content">
        <p class="eyebrow">CHECK-IN DO CORRETOR</p>
        <h2 id="corretor-checkin-title">Confirme sua chegada à loja</h2>
        <p class="description">
          Use o QR Code ou acesse a página para informar seu CPF.
        </p>
        <div class="store" aria-label="Loja padrão">
          <lightning-icon
            icon-name="utility:location"
            size="small"
          ></lightning-icon>
          <div>
            <strong>{store.nome}</strong>
            <p>{store.endereco}</p>
          </div>
        </div>
        <!-- <a class="cta" href={checkinUrl}>Realize seu check-in aqui</a> -->
      </div>
      <div class="qr-wrapper">
        <c-pesquisas-qr-code
          value={absoluteCheckinUrl}
          alternative-text="QR Code para fazer check-in na loja selecionada"
        ></c-pesquisas-qr-code>
        <span>Escaneie com a câmera do celular</span>
      </div>
    </template>
  </section>
</template>
