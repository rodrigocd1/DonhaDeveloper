<template>
    <div class="comm-utility">

        <!-- ── TELA 1: Seleção de Opportunity ── -->
        <template if:false={showChat}>
            <div class="comm-utility__picker">

                <div class="comm-utility__picker-header">
                    <lightning-icon icon-name="utility:chat" size="small"></lightning-icon>
                    <span>Communicator Chat</span>
                </div>

                <!-- Record Picker nativo -->
                <div class="comm-utility__picker-body">
                    <p class="comm-utility__picker-label">Select an Opportunity to open the chat:</p>

                    <lightning-record-picker
                        label="Opportunity"
                        placeholder="Search Opportunities..."
                        object-api-name="Opportunity"
                        value={selectedRecordId}
                        onchange={handleOpportunitySelect}
                        filter={opportunityFilter}
                    ></lightning-record-picker>

                    <!-- Recent opportunities -->
                    <template if:true={hasRecent}>
                        <div class="comm-utility__recent">
                            <p class="comm-utility__recent-label">Recent:</p>
                            <ul class="comm-utility__recent-list">
                                <template for:each={recentOpportunities} for:item="opp">
                                    <li key={opp.id} class="comm-utility__recent-item">
                                        <button
                                            class="comm-utility__recent-btn"
                                            data-id={opp.id}
                                            data-name={opp.name}
                                            onclick={handleRecentClick}
                                        >
                                            <lightning-icon icon-name="standard:opportunity" size="x-small"></lightning-icon>
                                            <span>{opp.name}</span>
                                        </button>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </div>

                <!-- Loading após seleção -->
                <template if:true={isLoadingThread}>
                    <div class="comm-utility__loading">
                        <lightning-spinner size="x-small" alternative-text="Loading chat..."></lightning-spinner>
                        <span>Opening chat...</span>
                    </div>
                </template>

                <!-- Erro -->
                <template if:true={loadError}>
                    <div class="comm-utility__error">
                        <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                        <span>{loadError}</span>
                    </div>
                </template>

            </div>
        </template>

        <!-- ── TELA 2: Chat ── -->
        <template if:true={showChat}>
            <div class="comm-utility__chat">

                <!-- Chat header -->
                <div class="comm-chat__header">
                    <div class="comm-chat__header-left">
                        <button class="comm-utility__back-btn" onclick={handleBack} title="Back to search">
                            <lightning-icon icon-name="utility:back" size="x-small"></lightning-icon>
                        </button>
                        <lightning-icon icon-name="standard:opportunity" size="x-small"></lightning-icon>
                        <span class="comm-chat__title" title={opportunityName}>{opportunityName}</span>
                    </div>
                    <div class="comm-chat__header-actions">
                        <lightning-button-icon
                            icon-name="utility:search"
                            variant="bare"
                            alternative-text="Search messages"
                            title="Search"
                            onclick={handleToggleSearch}
                        ></lightning-button-icon>
                        <template if:true={unreadCount}>
                            <span class="comm-utility__badge">{unreadCount}</span>
                        </template>
                    </div>
                </div>

                <!-- Search panel -->
                <template if:true={showSearch}>
                    <c-communicator-chat-search
                        thread-id={threadId}
                        onnavigatemessage={handleNavigateToMessage}
                    ></c-communicator-chat-search>
                </template>

                <!-- Timeline -->
                <c-communicator-chat-timeline
                    thread-id={threadId}
                    highlight-message-id={highlightMessageId}
                ></c-communicator-chat-timeline>

                <!-- Input -->
                <c-communicator-chat-message-input
                    thread-id={threadId}
                    onmessagesent={handleMessageSent}
                ></c-communicator-chat-message-input>

            </div>
        </template>

    </div>
</template>
